name: Pre-Training Privacy Gate End-To-End Simulation

on: [push, pull_request]

jobs:
  # JOB 1: Inspect incoming clinic data
  evaluate-privacy-gate:
    runs-on: ubuntu-latest
    outputs:
      gate_verdict: ${{ steps.check_step.outputs.gate_status }}
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Initialize Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install pandas numpy matplotlib

    - name: Execute Privacy Firewall Gate
      id: run_gate
      continue-on-error: true
      run: |
        python3 sprint3_k_anonymity_gate.py --profile equal --data_path ./equal/client_0.csv

    - name: Determine Verdict
      id: check_step
      run: |
        if [ "${{ steps.run_gate.outcome }}" = "success" ]; then
          echo "gate_status=PASSED" >> $GITHUB_OUTPUT
        else
          echo "gate_status=FAILED" >> $GITHUB_OUTPUT
        fi

  # JOB 2A: Automated Success Path (Runs instantly if data is clean)
  automated-ml-deployment:
    needs: evaluate-privacy-gate
    if: needs.evaluate-privacy-gate.outputs.gate_verdict == 'PASSED'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
    - name: Trigger Automated Update
      run: python3 execute_model_update.py

  # JOB 2B: Human Override Path (Fires if gate fails, waiting for UI click)
  human-triage-panel:
    needs: evaluate-privacy-gate
    if: needs.evaluate-privacy-gate.outputs.gate_verdict == 'FAILED'
    runs-on: ubuntu-latest
    environment: production-gatekeeper # Triggers the real GitHub Override Panel UI

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Initialize Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linux Mail Simulator Tools
      run: |
        pip install pandas numpy matplotlib secure-smtpd
        # Starts a completely local, background SMTP server on localhost port 1025
        python -m secure_smtpd (localhost, 1025) &
        sleep 2

    - name: Fire Quarantine and Dispatches Warning Email
      run: python3 trigger_quarantine_alert.py
      env:
        SECURITY_ALERT_SENDER: "privacy-firewall@localhost"
        SECURITY_ALERT_RECIPIENT: "abhisakh@gmail.com"
        SMTP_SERVER: "127.0.0.1" # Loops back locally inside the GitHub container
        SMTP_PORT: 1025
        EMAIL_PASSWORD: "mock_sandbox_token"

    - name: Execute Override Deployment
      run: |
        echo "[⚠️ OVERRIDE] Manual clearance granted via GitHub Interactive Panel UI."
        python3 execute_model_update.py