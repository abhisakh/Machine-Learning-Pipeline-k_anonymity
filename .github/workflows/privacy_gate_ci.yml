name: Pre-Training Privacy Gate End-To-End Simulation

on: [push, pull_request]

jobs:
  privacy-firewall-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Initialize Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install pandas numpy matplotlib

    # ─── CORE QUALITY GATE STEP ───
    - name: Execute Privacy Firewall Gate
      id: run_gate
      # continue-on-error allows us to run the quarantine/email logic if the gate fails
      continue-on-error: true
      run: |
        python3 sprint3_k_anonymity_gate.py --profile equal --data_path ./equal/client_0.csv
      env:
        # FALSE POSITIVE OVERRIDE: Change this to "TRUE" here if you need to manually
        # force a deployment after a false-positive alarm block. Leave as "FALSE" normally.
        ANONYMITY_GATE_OVERRIDE: "FALSE"

    # ─── REJECTION PATH (Runs ONLY if the gate step fails with exit code 1) ───
    - name: Fire Quarantine and Dispatches Warning Email
      if: steps.run_gate.outcome == 'failure'
      run: |
        python3 trigger_quarantine_alert.py
      env:
        SECURITY_ALERT_SENDER: "abhisakh@gmail.com"
        SECURITY_ALERT_RECIPIENT: "abhisakh@gmail.com"
        SMTP_SERVER: "smtp.gmail.com"
        SMTP_PORT: 587
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

    # ─── SEPARATION DEPLOYMENT GATEWAY ───
    - name: Trigger Automated Update
      # This step builds if the gate naturally passed OR if you explicitly applied the override token above
      if: |
        steps.run_gate.outcome == 'success' ||
        contains(fromJSON('["TRUE"]'), env.ANONYMITY_GATE_OVERRIDE)
      run: |
        python3 execute_model_update.py